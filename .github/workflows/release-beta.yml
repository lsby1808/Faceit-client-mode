name: Release beta

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  beta:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      ELOSCOPE_COMPAT_URL: ${{ secrets.ELOSCOPE_COMPAT_URL }}
      ELOSCOPE_COMPAT_PUBLIC_KEY: ${{ secrets.ELOSCOPE_COMPAT_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Require updater signing key
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required for every published beta"
          }
          if ([string]::IsNullOrWhiteSpace($env:ELOSCOPE_COMPAT_URL) -or
              [string]::IsNullOrWhiteSpace($env:ELOSCOPE_COMPAT_PUBLIC_KEY)) {
            throw "Signed compatibility URL and Ed25519 public key are required"
          }
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build:extension
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: EloScope v__VERSION__
          releaseBody: |
            Independent FACEIT enhancement beta for Windows x64.

            This is the public OTA beta channel. It is intentionally published
            as GitHub's latest release so installed clients can retrieve
            latest.json. The version remains SemVer beta.

            The updater payload is cryptographically signed, but the installer
            may not yet have a Windows Authenticode signature. Windows
            SmartScreen can therefore display an unrecognized-app warning.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: --target x86_64-pc-windows-msvc
