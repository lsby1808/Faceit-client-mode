    <title>EloScope visual fixture</title>
    <style>
      html, body { min-height: 100%; margin: 0; background: radial-gradient(circle at 70% 0, #242a32, #08090b 58%); color: #fff; font-family: Segoe UI, sans-serif; }
      header { height: 56px; display: flex; align-items: center; padding: 0 22px; background: #101216; border-bottom: 1px solid #ffffff13; }
      main { max-width: 1260px; margin: 18px auto; padding: 14px; }
      .room { display: grid; grid-template-columns: minmax(280px, 1fr) minmax(300px, 400px) minmax(280px, 1fr); gap: 20px; align-items: start; }
      [class*="Roster__Group-sc-"] { min-width: 0; }
      [class*="Roster__Group-sc-"] > h2 { margin: 0 0 8px; color: #afb4bc; font-size: 13px; }
      [class*="styles__Holder-sc-"] { position: relative; display: block; margin-bottom: 14px; }
      [class*="ListContentPlayer__Background-sc-"] { height: 58px; display: flex; align-items: center; gap: 10px; padding: 0 12px; border: 1px solid #ffffff1c; border-radius: 5px; background: #15171b; }
      [class*="ListContentPlayer__SlotWrapper-sc-"] { display: flex; flex: 0 0 48px; align-items: center; }
      [class*="styles__PlayerCardContainer-sc-"] { position: relative; width: 40px; height: 40px; }
      [class*="styles__PlayerCard-sc-"] { position: absolute; inset: -8px; pointer-events: none; }
      [class*="Avatar__AvatarHolder-sc-"] { position: relative; display: inline-block; width: 40px; height: 40px; }
      [class*="Avatar__Image-sc-"] { display: block; width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
      [class*="styles__Container-sc-fixture-avatar-badges"] { position: absolute; z-index: 2; inset: 0; pointer-events: none; }
      [data-testid="membership badge"] { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; border-radius: 50%; background: #d9a441; }
      [data-testid="anti-cheat badge"] { position: absolute; right: -2px; bottom: -2px; width: 8px; height: 8px; border-radius: 2px; background: #28c76f; }
      [class*="styles__NicknameContainer-sc-"] { display: flex; flex: 1 1 auto; align-items: center; min-width: 0; }
      [class*="Nickname__Container-sc-"] { display: flex; min-width: 0; }
      [class*="Nickname__Name-sc-"] { overflow: hidden; font-weight: 750; text-overflow: ellipsis; white-space: nowrap; }
      [class*="styles__EndSlotContainer-sc-"] { display: flex; flex: 0 0 auto; align-items: center; gap: 8px; }
      .native-level { width: 30px; height: 30px; color: #ff2854; }
      .center { min-height: 430px; padding: 12px; border: 1px solid #ffffff12; border-radius: 8px; background: #111419; color: #929aa5; }
      .preference { margin-top: 10px; padding: 14px; border-radius: 5px; background: #202226; color: #fff; font-weight: 700; }
      .chat { position: absolute; left: -9999px; }
    </style>
  </head>
